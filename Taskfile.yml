version: '3'

vars:
  BIN_DIR: bin
  GO_FLAGS: -trimpath -ldflags="-s -w"
  GO_TEST_FLAGS: -v -race -count=1 -timeout 120s

tasks:
  default:
    desc: Run lint, test, build
    deps: [lint, test, build]

  lint:
    desc: Run golangci-lint with strict rules
    cmds:
      - golangci-lint run --fix ./...
    sources:
      - "**/*.go"
      - .golangci.yml
    generates:
      - .golangci-lint-cache.stamp
    status:
      - test -f .golangci-lint-cache.stamp

  test:
    desc: Run all tests with race detection and coverage
    cmds:
      - go test {{.GO_TEST_FLAGS}} -coverprofile=coverage.txt ./...
    sources:
      - "**/*.go"
      - "**/*_test.go"
    generates:
      - coverage.txt

  build:
    desc: Build ultrawhale binaries (macOS + Linux + tools)
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build {{.GO_FLAGS}} -o {{.BIN_DIR}}/ultrawhale ./cmd/whale
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v3 go build {{.GO_FLAGS}} -o {{.BIN_DIR}}/ultrawhale-linux ./cmd/whale
      - go build -o {{.BIN_DIR}}/ultrawhale-setup ./cmd/setup/
      - go build -o {{.BIN_DIR}}/ultrawhale-bench-tui ./cmd/bench-tui/
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/ultrawhale"
      - "{{.BIN_DIR}}/ultrawhale-linux"

  ci:
    desc: Run CI pipeline locally via act
    cmds:
      - act -P ubuntu-latest=-self-hosted
    sources:
      - .github/workflows/ci.yml

  bench:
    desc: Run benchmarks + TUI load test
    cmds:
      - go test -bench=. -benchmem -benchtime=500ms ./internal/blocks/ ./internal/modes/
      - "{{.BIN_DIR}}/ultrawhale-bench-tui"

  doctor:
    desc: Run ultrawhale self-check
    cmds:
      - "{{.BIN_DIR}}/ultrawhale --dangerously-skip-permissions doctor"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}} coverage.txt .golangci-lint-cache.stamp

  dev-deploy:
    desc: Build + deploy site to CF Pages
    cmds:
      - rm -rf deploy-out
      - mkdir -p deploy-out/ultrawhale/docs deploy-out/ultrawhale/book deploy-out/ultrawhale/blog
      - cp site/index.html deploy-out/ultrawhale/
      - cp site/logo.svg deploy-out/ultrawhale/ 2>/dev/null; true
      - cp site/robots.txt deploy-out/ultrawhale/ 2>/dev/null; true
      - cp site/sitemap.xml deploy-out/ultrawhale/ 2>/dev/null; true
      - cp docs/index.html deploy-out/ultrawhale/docs/
      - cp -r rendered-docs/* deploy-out/ultrawhale/docs/ 2>/dev/null; true
      - cp -r docs-book/book/* deploy-out/ultrawhale/book/ 2>/dev/null; true
      - cp -r site/blog/*.html deploy-out/ultrawhale/blog/ 2>/dev/null; cp -r site/blog/*.md deploy-out/ultrawhale/blog/ 2>/dev/null; true
      - mkdir -p deploy-out/ultrawhale/event-horizon
      - cp -r site/event-horizon/* deploy-out/ultrawhale/event-horizon/ 2>/dev/null; true
      - mkdir -p deploy-out/ultrawhale/dogfood
      - cp -r site/dogfood/* deploy-out/ultrawhale/dogfood/ 2>/dev/null; true
      - # Auto-export dataset if available
      - cp ~/.ultrawhale/dogfeed/dogfeed-*.jsonl deploy-out/ultrawhale/dogfood/ 2>/dev/null; true
      - wrangler pages deploy deploy-out --project-name=vaked-dev --branch=main --commit-dirty=true
      - rm -rf deploy-out

  dev-ship:
    desc: Build + test + commit + push
    cmds:
      - go test -count=1 ./internal/blocks/
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o bin/ultrawhale ./cmd/whale
      - cp bin/ultrawhale ~/.local/bin/ultrawhale

  dev-bench:
    desc: Full benchmark suite
    cmds:
      - go test -bench=. -benchmem -benchtime=500ms ./internal/blocks/
      - bin/ultrawhale-bench-tui

  hf-upload-local:
    desc: Upload local dogfeed JSONL files to HF (read-only, skips active file)
    cmds:
      - uv run scripts/upload_local_dogfeed.py --dir {{.DIR | default "."}}

  hf-upload-local-dry:
    desc: Dry-run — show what would be uploaded without pushing
    cmds:
      - uv run scripts/upload_local_dogfeed.py --dir {{.DIR | default "."}} --dry-run

  hf-plot:
    desc: Regenerate dataset growth projection chart (site/dogfood/growth.png)
    cmds:
      - uv run scripts/plot_growth.py

  hf-optimize:
    desc: Merge JSONL → Parquet and push to HuggingFace (requires HF_TOKEN)
    cmds:
      - uv run scripts/hf_optimize.py

  hf-optimize-dry:
    desc: Merge JSONL → Parquet locally without pushing (no token needed)
    cmds:
      - uv run scripts/hf_optimize.py --dry-run

  hf-optimize-dogfeed:
    desc: Optimize dogfeed stream only
    cmds:
      - uv run scripts/hf_optimize.py --stream dogfeed

  hf-optimize-telemetry:
    desc: Optimize telemetry stream only
    cmds:
      - uv run scripts/hf_optimize.py --stream telemetry

  dev-clean:
    desc: Reset to pristine
    cmds:
      - rm -rf bin/ deploy-out/ coverage.txt .golangci-lint-cache.stamp



  kompress-data:
    desc: Export ultrawhale dataset as Kompress training pairs
    cmds:
      - uv run python scripts/export_for_kompress.py --output data/kompress_train.jsonl
    sources:
      - scripts/export_for_kompress.py

  kompress-train-local:
    desc: Fine-tune Kompress locally (MPS/CPU, slow — for testing only)
    cmds:
      - uv run python scripts/train_kompress.py
          --data data/kompress_train.jsonl
          --epochs 1
          --batch-size 8
          --output kompress-v3-local-test

  kompress-eval:
    desc: Eval a Kompress checkpoint against the test split
    vars:
      MODEL: '{{.MODEL | default "kompress-v3-finetuned"}}'
    cmds:
      - uv run python scripts/eval_kompress.py
          --model {{.MODEL}}
          --data data/kompress_test.jsonl

  kompress-vast-launch:
    desc: Rent RTX 4090 on vast.ai and run full training ($0.356/hr, ~30min = $0.18)
    vars:
      OFFER_ID: '{{.OFFER_ID | default "37031007"}}'
    cmds:
      - vastai create instance {{.OFFER_ID}}
          --image pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          --disk 30
          --env "-e HF_TOKEN=$HF_TOKEN -e HF_REPO=peterlodri-sec/kompress-v3"
          --onstart "bash /workspace/ultrawhale/scripts/vast_setup.sh && bash /workspace/ultrawhale/scripts/run_training.sh"
      - echo "Instance launched. Monitor at vast.ai dashboard."

  kompress-vast-ssh:
    desc: SSH into running vast.ai instance
    vars:
      INSTANCE_ID: '{{.INSTANCE_ID}}'
    cmds:
      - vastai ssh {{.INSTANCE_ID}}

  kompress-v31-data:
    desc: Generate domain-tagged training data for v3.1
    cmds:
      - uv run python scripts/build_domain_data.py --output data/domain_train.jsonl
      - echo "Generated domain training data"

  kompress-v31-vast:
    desc: Launch v3.1 fine-tune on vast.ai
    vars:
      OFFER_ID: '{{.OFFER_ID | default ""}}'
    cmds:
      - bash scripts/vast_relaunch.sh {{.OFFER_ID}}
