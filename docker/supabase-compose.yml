version: "3.8"
name: ultrawhale-supabase
services:
  db:
    image: supabase/postgres:17.6.1.136
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ultrawhale
      POSTGRES_DB: ultrawhale
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  rest:
    image: postgrest/postgrest:v14.12
    restart: unless-stopped
    ports:
      - "8586:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:ultrawhale@db:5432/ultrawhale
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ultrawhale-dev-secret-change-in-production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
