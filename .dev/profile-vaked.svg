<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#141420"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Vaked Triangle (Context × Time × Space) -->
  <polygon points="200,60 340,300 60,300" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
  
  <!-- Context (WHAT) -->
  <text x="200" y="100" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="14" font-weight="bold">CONTEXT</text>
  <text x="200" y="118" text-anchor="middle" fill="#6878a0" font-family="monospace" font-size="10">POV · Capabilities · Brain</text>
  
  <!-- Time (WHEN) -->
  <text x="90" y="280" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12" font-weight="bold">TIME</text>
  <text x="90" y="296" text-anchor="middle" fill="#6878a0" font-family="monospace" font-size="9">Journal · Sessions</text>
  
  <!-- Space (WHERE) -->
  <text x="310" y="280" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12" font-weight="bold">SPACE</text>
  <text x="310" y="296" text-anchor="middle" fill="#6878a0" font-family="monospace" font-size="9">Topology · VFS</text>
  
  <!-- SACRED surface (center) -->
  <rect x="175" y="235" width="50" height="50" fill="none" stroke="#00e660" stroke-width="2"/>
  <text x="200" y="262" text-anchor="middle" fill="#00e660" font-family="monospace" font-size="8">SACRED</text>
  
  <!-- Recursion rings around triangle -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#6878a0" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#6878a0" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#6878a0" stroke-width="1" opacity="0.1"/>
  
  <!-- VAKED wordmark -->
  <text x="200" y="370" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="4">VAKED</text>
  
  <!-- Loop indicator -->
  <text x="200" y="388" text-anchor="middle" fill="#6878a0" font-family="monospace" font-size="8">v60.0.0 · 94 blocks · 6 recursions</text>
</svg>
