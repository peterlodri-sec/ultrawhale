version: "2"
linters:
  enable:
    - gocritic
    - govet
    - revive
    - staticcheck
    - errcheck
    - ineffassign
    - gosec
    - unused
linters-settings:
  gocritic:
    enabled-checks:
      - wrapperFunc
      - appendCombine
      - rangeExprCopy
  revive:
    rules:
      - name: exported
      - name: blank-imports
  govet:
    enable:
      - nilness
      - shadow
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
run:
  timeout: 5m
  tests: true


  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
