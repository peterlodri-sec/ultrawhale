version: "2"
linters:
  enable: [gocritic, govet, revive, staticcheck, errcheck, ineffassign, gosec, unused]
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec]
      - path: internal/blocks/asm/
        linters: [all]
      - path: internal/tui/
        linters: [errcheck]
formatters:
  enable: [gofmt, goimports]
run:
  timeout: 5m
  tests: false
