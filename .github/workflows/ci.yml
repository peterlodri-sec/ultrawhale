name: ci
on: [push, pull_request]
jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '1.26' }
      - run: go test -race -count=1 -run TestReadWrite ./internal/blocks/
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v3 go build -trimpath -ldflags="-s -w" -o bin/ultrawhale ./cmd/whale
      - run: ls -lh bin/ultrawhale && echo "✅ CI OK"
