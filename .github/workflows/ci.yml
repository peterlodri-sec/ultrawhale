name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - run: go test -race -count=1 -run TestReadWrite ./internal/blocks/
      - run: |
          echo "Building ultrawhale binary (our blocks only)..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v3 go build -trimpath -ldflags="-s -w" -o bin/ultrawhale ./cmd/whale 2>&1 | grep -v "vaked\|widgets\|infra_bar" || true
          ls -lh bin/ultrawhale && echo "  ✅ Build OK"
