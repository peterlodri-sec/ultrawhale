name: deploy-ultrawhale-site
on:
  push:
    branches: [main]
    paths: ['site/**', 'docs-book/book/**']
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ci
    steps:
      - uses: actions/checkout@v6
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=vaked-dev --branch=main --commit-dirty=true
