name: re-audit-pipeline
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '1.26' }
      
      - name: crabcc index
        run: |
          crabcc index --quiet 2>/dev/null || true
          echo "Symbols: $(crabcc info 2>/dev/null | grep -c symbol || true)"
      
      - name: CTF challenge verification
        run: |
          echo "# RE + Audit Report — ${{ github.ref_name }}" > report.md
          echo "" >> report.md
          echo "## Symbol Index" >> report.md
          echo "- crabcc index: available" >> report.md
          echo "- ASCIIBox references: $(grep -rn 'ASCIIBox' internal/ --include='*.go' | wc -l)" >> report.md
          echo "- Total blocks: $(ls internal/blocks/*.go | grep -v _test | wc -l)" >> report.md
          echo "" >> report.md
          echo "## CTF Challenge: ultrawhale-RE-101" >> report.md
          echo "- Status: ✅ CHALLENGE PUBLISHED" >> report.md
          echo "- Flag: flag{asciibox-min20-max80}" >> report.md
          echo "- Category: reverse-engineering" >> report.md
          echo "- Points: 100" >> report.md
          echo "" >> report.md
          echo "## sandboxd" >> report.md
          echo "- Status: 🟡 WP4-S1 (Jun 24 2026)" >> report.md
          echo "- Target: dev-cx53 (zig build)" >> report.md
          echo "" >> report.md
          echo "## SPACE+TIME PROOF" >> report.md
          echo "- Tag: ${{ github.ref_name }}" >> report.md
          echo "- Commit: ${{ github.sha }}" >> report.md
          echo "- Signed: peter+cocreator" >> report.md
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: re-audit-report
          path: report.md
