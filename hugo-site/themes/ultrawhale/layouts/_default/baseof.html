<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ if .Title }}{{ .Title }} — {{ end }}ultrawhale</title>
<style>
:root{--bg:#0a0a14;--fg:#e0e8f5;--accent:#00d4ff;--green:#00e660;--dim:#6878a0;--card:#141420;--purple:#b44dff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:system-ui,monospace;padding:2rem;max-width:800px;margin:0 auto;line-height:1.8}
h1,h2{color:var(--accent)}a{color:var(--accent)}code{background:var(--card);padding:2px 6px;border-radius:3px}
pre{background:var(--card);padding:1rem;border-radius:6px}nav{margin-bottom:2rem}nav a{margin-right:1rem}
footer{margin-top:3rem;color:var(--dim);font-size:.8rem;border-top:1px solid var(--card);padding-top:1rem}
</style>
</head>
<body><nav><a href="/ultrawhale/">Home</a> <a href="/ultrawhale/blog/">Blog</a> <a href="/ultrawhale/docs/">Docs</a></nav>
{{ block "main" . }}{{ end }}
<footer>ultrawhale · v100.1.0</footer></body></html>
